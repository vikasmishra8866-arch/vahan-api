<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle RC Status Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 shadow-lg p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400 flex items-center gap-2">
                <i class="fa-solid fa-car-rear"></i> VahanVerify
            </h1>
            <span class="text-xs bg-slate-700 px-3 py-1 rounded-full text-slate-400">RC Status Dashboard v2</span>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-center text-white">Vehicle RC Verification</h2>
            <p class="text-sm text-slate-400 text-center mb-6">Enter the vehicle registration number to fetch real-time RC details.</p>

            <form id="rcForm" class="max-w-xl mx-auto mb-8">
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-grow">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-solid fa-address-card"></i>
                        </span>
                        <input 
                            type="text" 
                            id="vehicleNumber" 
                            placeholder="e.g., DL3CAW1234, MH12AB1234" 
                            required
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl py-3.5 pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 uppercase tracking-widest font-semibold transition-all"
                        >
                    </div>
                    <button 
                        type="submit" 
                        class="bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-bold px-6 py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/30 transition-all cursor-pointer"
                    >
                        <i class="fa-solid fa-magnifying-glass"></i> Search
                    </button>
                </div>
            </form>

            <div id="loading" class="hidden text-center py-12">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="text-slate-400 mt-4 font-medium">Fetching details from RTO server...</p>
            </div>

            <div id="errorMessage" class="hidden bg-red-950/50 border border-red-800 text-red-300 px-4 py-3 rounded-xl max-w-xl mx-auto text-center mb-6 flex items-center justify-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorText">Something went wrong!</span>
            </div>

            <div id="resultDashboard" class="hidden animate-fadeIn">
                <div class="border-t border-slate-700 pt-6">
                    <h3 class="text-lg font-bold text-slate-300 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-circle-info text-emerald-400"></i> RC Details Result
                    </h3>
                    
                    <div id="rcDetailsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-slate-950 border-t border-slate-800 text-center py-4 text-xs text-slate-600">
        &copy; 2026 Vehicle RC Dashboard. Powered by RapidAPI.
    </footer>

    <script>
        // API Configurations
        const API_KEY = "a5175b9516mshdab26204e9428aap13a278jsnaf854305ba92";
        const API_HOST = "rapidapi.com"; // नोट: अगर आपके API का होस्ट अलग है जैसे 'vehicle-rc-information.p.rapidapi.com' तो उसे यहाँ बदलें

        document.getElementById('rcForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const vehicleNumber = document.getElementById('vehicleNumber').value.trim().toUpperCase();
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            const resultDashboard = document.getElementById('resultDashboard');
            const rcDetailsGrid = document.getElementById('rcDetailsGrid');

            // Reset UI
            loading.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            resultDashboard.classList.add('hidden');
            rcDetailsGrid.innerHTML = '';

            // API Endpoint (आपकी इमेज 'Vehicle Advanced Info' की है, उसके अनुसार POST रिक्वेस्ट)
            const url = 'https://vehicle-rc-information-v2.p.rapidapi.com/v1/vehicle/advanced-info'; 
            
            const options = {
                method: 'POST',
                headers: {
                    'content-type': 'application/json',
                    'X-RapidAPI-Key': API_KEY,
                    'X-RapidAPI-Host': API_HOST
                },
                body: JSON.stringify({
                    vehicle_number: vehicleNumber
                })
            };

            try {
                const response = await fetch(url, options);
                const data = await response.json();

                if (!response.ok || data.status === "failed" || data.error) {
                    throw new Error(data.message || data.error || "Vehicle details not found.");
                }

                // डाटा मिलने पर डैशबोर्ड रेंडर करना
                renderDashboard(data.result || data); 
                resultDashboard.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                document.getElementById('errorText').innerText = error.message || "Failed to connect to the server.";
                errorMessage.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        });

        // डैशबोर्ड में डाटा दिखाने का फंक्शन
        function renderDashboard(data) {
            const rcDetailsGrid = document.getElementById('rcDetailsGrid');
            
            // अगर API का रिस्पॉन्स स्ट्रक्चर अलग हो, तो इसे अपनी API Keys के हिसाब से बदलें
            // यहाँ एक स्टैण्डर्ड RTO रिस्पॉन्स फॉर्मेट माना गया है:
            const displayFields = [
                { label: "Registration No", val: data.reg_no || data.vehicle_number || "N/A", icon: "fa-id-card" },
                { label: "Owner Name", val: data.owner_name || data.owner || "N/A", icon: "fa-user" },
                { label: "Maker / Model", val: data.maker_model || data.model || "N/A", icon: "fa-car" },
                { label: "Chassis Number", val: data.chassis_no || data.chassis || "N/A", icon: "fa-fingerprint" },
                { label: "Engine Number", val: data.engine_no || data.engine || "N/A", icon: "fa-gears" },
                { label: "Fuel Type", val: data.fuel_type || data.fuel || "N/A", icon: "fa-gas-pump" },
                { label: "Registration Date", val: data.reg_date || data.registration_date || "N/A", icon: "fa-calendar-days" },
                { label: "RC Status", val: data.status || data.rc_status || "ACTIVE", icon: "fa-shield-halved" }
            ];

            displayFields.forEach(field => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center gap-4";
                
                // Status के लिए अलग रंग दिखाना
                let valClass = "text-white font-semibold";
                if(field.label === "RC Status" && (field.val.toUpperCase() === "ACTIVE" || field.val.toUpperCase() === "ACTIVE")) {
                    valClass = "text-emerald-400 font-bold";
                }

                card.innerHTML = `
                    <div class="w-12 h-12 rounded-lg bg-slate-800 flex items-center justify-center text-emerald-400 text-lg">
                        <i class="fa-solid ${field.icon}"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">${field.label}</p>
                        <p class="${valClass} mt-0.5 break-all">${field.val}</p>
                    </div>
                `;
                rcDetailsGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
