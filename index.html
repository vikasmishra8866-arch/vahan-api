<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle RC Status Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 shadow-lg p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider text-emerald-400 flex items-center gap-2">
                <i class="fa-solid fa-car-rear"></i> VahanVerify
            </h1>
            <span class="text-xs bg-slate-700 px-3 py-1 rounded-full text-slate-400">RC Status Dashboard v2</span>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-2 text-center text-white">Vehicle RC Verification</h2>
            <p class="text-sm text-slate-400 text-center mb-6">Enter the vehicle registration number to fetch real-time RC details.</p>

            <form id="rcForm" class="max-w-xl mx-auto mb-8">
                <div class="flex flex-col sm:flex-row gap-3">
                    <div class="relative flex-grow">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                            <i class="fa-solid fa-address-card"></i>
                        </span>
                        <input 
                            type="text" 
                            id="vehicleNumber" 
                            placeholder="e.g., GJ05HG7801, PB65AM0008" 
                            required
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl py-3.5 pl-10 pr-4 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 uppercase tracking-widest font-semibold transition-all"
                        >
                    </div>
                    <button 
                        type="submit" 
                        class="bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 text-white font-bold px-6 py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/30 transition-all cursor-pointer"
                    >
                        <i class="fa-solid fa-magnifying-glass"></i> Search
                    </button>
                </div>
            </form>

            <div id="loading" class="hidden text-center py-12">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-emerald-500 border-t-transparent"></div>
                <p class="text-slate-400 mt-4 font-medium">Fetching details from RTO server...</p>
            </div>

            <div id="errorMessage" class="hidden bg-red-950/50 border border-red-800 text-red-300 px-4 py-3 rounded-xl max-w-xl mx-auto text-center mb-6 flex items-center justify-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="errorText">Something went wrong!</span>
            </div>

            <div id="resultDashboard" class="hidden animate-fadeIn">
                <div class="border-t border-slate-700 pt-6">
                    <h3 class="text-lg font-bold text-slate-300 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-circle-info text-emerald-400"></i> RC Details Result
                    </h3>
                    
                    <div id="rcDetailsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="bg-slate-950 border-t border-slate-800 text-center py-4 text-xs text-slate-600">
        &copy; 2026 Vehicle RC Dashboard. Powered by RapidAPI.
    </footer>

    <script>
        document.getElementById('rcForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const vehicleNumberInput = document.getElementById('vehicleNumber').value.trim().toUpperCase();
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            const resultDashboard = document.getElementById('resultDashboard');
            const rcDetailsGrid = document.getElementById('rcDetailsGrid');

            // Reset UI States
            loading.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            resultDashboard.classList.add('hidden');
            rcDetailsGrid.innerHTML = '';

            // Exact Configuration from your Code Snippet
            const url = 'https://v2.rapidapi.com/fatehbrar92/api/vehicle-rc-information-v2/';
            const options = {
                method: 'POST',
                headers: {
                    'x-rapidapi-key': 'a5175b9516mshdab26204e9428aap13a278jsnaf854305ba92',
                    'x-rapidapi-host': 'vehicle-rc-information-v2.p.rapidapi.com',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    vehicle_number: vehicleNumberInput
                })
            };

            try {
                const response = await fetch(url, options);
                
                if (!response.ok) {
                    if(response.status === 404) {
                        throw new Error("Endpoint not found (404). Please verify API deployment.");
                    } else if(response.status === 403) {
                        throw new Error("Invalid API Key or subscription limit reached (403).");
                    } else {
                        throw new Error(`Server returned error status: ${response.status}`);
                    }
                }

                const data = await response.json();
                console.log("API Response Data:", data);

                // Check if API returned an error inside JSON structure
                if (data.status === "failed" || data.error) {
                    throw new Error(data.message || data.error || "Vehicle details not found.");
                }

                // Call Render Function
                renderDashboard(data); 
                resultDashboard.classList.remove('hidden');

            } catch (error) {
                console.error("Error occurred:", error);
                document.getElementById('errorText').innerText = error.message || "Failed to connect to the server.";
                errorMessage.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        });

        // Function to dynamic display data on UI cards
        function renderDashboard(data) {
            const rcDetailsGrid = document.getElementById('rcDetailsGrid');
            
            // Extracting values or setting fallback fields based on your exact API response
            const displayFields = [
                { label: "Registration No", val: data.license_plate || data.vehicleId || data.reg_no || document.getElementById('vehicleNumber').value.toUpperCase(), icon: "fa-id-card" },
                { label: "Owner Name", val: data.owner_name || data.owner || "N/A", icon: "fa-user" },
                { label: "Brand Name", val: data.brand_name || "N/A", icon: "fa-building" },
                { label: "Model / Variant", val: data.brand_model || data.maker_model || "N/A", icon: "fa-car" },
                { label: "Engine Number", val: data.engine_number || data.engine_no || "N/A", icon: "fa-gears" },
                { label: "Fuel Type", val: data.fuel_type || "N/A", icon: "fa-gas-pump" },
                { label: "Tax Paid Upto", val: data.tax_paid_upto || "N/A", icon: "fa-calendar-days" },
                { label: "RC Status", val: data.rc_status || "ACTIVE", icon: "fa-shield-halved" }
            ];

            displayFields.forEach(field => {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center gap-4 animate-fadeIn";
                
                let valClass = "text-white font-semibold text-sm sm:text-base";
                if(field.label === "RC Status" && field.val.toUpperCase() === "ACTIVE") {
                    valClass = "text-emerald-400 font-bold text-sm sm:text-base";
                }

                card.innerHTML = `
                    <div class="w-12 h-12 rounded-lg bg-slate-800 flex items-center justify-center text-emerald-400 text-lg flex-shrink-0">
                        <i class="fa-solid ${field.icon}"></i>
                    </div>
                    <div class="min-w-0 flex-grow">
                        <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">${field.label}</p>
                        <p class="${valClass} mt-0.5 break-words">${field.val}</p>
                    </div>
                `;
                rcDetailsGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
